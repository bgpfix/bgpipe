# GoBGP accepting a session from bgpipe (dynamic neighbor: source IP unknown)
[global.config]
  as = 65000
  router-id = "10.0.0.100"
  port = 1790

[[peer-groups]]
  [peer-groups.config]
    peer-group-name = "test"
    peer-as = 65000

[[dynamic-neighbors]]
  [dynamic-neighbors.config]
    prefix = "0.0.0.0/0"
    peer-group = "test"
