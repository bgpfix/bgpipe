name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build binaries
        run: |
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-s -w -X main.BuildVersion=${VERSION}"
          mkdir dist

          build() {
            local os=$1 arch=$2 arm=$3
            local suffix=""
            [ "$os" = "windows" ] && suffix=".exe"
            local name="bgpipe-${os}-${arch}"
            [ -n "$arm" ] && name="${name}v${arm}"
            local out="dist/${name}${suffix}"

            echo "Building $out ..."
            local output
            if output=$(env CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" GOARM="$arm" \
              go build -ldflags="$LDFLAGS" -trimpath -o "$out" . 2>&1); then
              echo "  OK $(du -sh "$out" | cut -f1)"
            elif echo "$output" | grep -q "unsupported GOOS/GOARCH"; then
              echo "  SKIP (unsupported ${os}/${arch})"
            else
              echo "$output" >&2
              echo "  FAIL ${os}/${arch}" >&2
              return 1
            fi
          }

          # NB: pure Go - anything else can always `go build`
          build linux amd64
          build linux arm64
          build darwin arm64
          build darwin amd64
          build freebsd amd64
          build openbsd amd64
          build windows amd64
          build android arm64

          ls -lh dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
